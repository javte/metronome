<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Metronome">
<meta name="theme-color" content="#1a1a2e">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<title>Metronome</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
  input, textarea { touch-action: auto; }

  :root {
    --bg: #1a1a2e;
    --surface: #16213e;
    --card: #0f3460;
    --accent: #e94560;
    --accent2: #f5a623;
    --text: #eaeaea;
    --text2: #a0a0b0;
    --border: rgba(255,255,255,0.1);
    --radius: 16px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    min-height: -webkit-fill-available;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  header {
    padding: 56px 24px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  header h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  .tab-bar {
    display: flex;
    background: var(--surface);
    border-radius: 12px;
    padding: 4px;
    margin: 0 24px 20px;
  }

  .tab {
    flex: 1;
    padding: 9px;
    text-align: center;
    border-radius: 9px;
    font-size: 14px;
    font-weight: 500;
    color: var(--text2);
    cursor: pointer;
    transition: all 0.2s;
    border: none;
    background: none;
  }

  .tab.active {
    background: var(--card);
    color: var(--text);
  }

  .page { display: none; flex: 1; padding: 0 24px 40px; }
  .page.active { display: block; }

  /* BPM display */
  .bpm-display {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 32px 24px 24px;
    text-align: center;
    margin-bottom: 20px;
    border: 1px solid var(--border);
  }

  .bpm-label {
    font-size: 13px;
    color: var(--text2);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .bpm-number {
    font-size: 80px;
    font-weight: 800;
    letter-spacing: -4px;
    line-height: 1;
    color: var(--text);
    font-variant-numeric: tabular-nums;
  }

  .bpm-name {
    font-size: 13px;
    color: var(--accent2);
    margin-top: 8px;
    min-height: 18px;
    font-style: italic;
  }

  /* Beat indicator */
  .beat-row {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin: 16px 0;
  }

  .beat-dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--border);
    transition: background 0.08s;
  }

  .beat-dot.accent { background: rgba(245,166,35,0.3); }
  .beat-dot.active { background: var(--accent) !important; transform: scale(1.2); }
  .beat-dot.accent.active { background: var(--accent2) !important; }

  /* Slider */
  .slider-wrap {
    margin: 20px 0;
  }

  input[type=range] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 6px;
    border-radius: 3px;
    background: linear-gradient(to right, var(--accent) 0%, var(--accent) var(--val, 30%), var(--surface) var(--val, 30%));
    outline: none;
    cursor: pointer;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(233,69,96,0.4);
  }

  /* Buttons */
  .btn-row {
    display: flex;
    gap: 10px;
    margin: 20px 0;
  }

  .btn {
    flex: 1;
    padding: 16px;
    border-radius: 14px;
    font-size: 15px;
    font-weight: 600;
    border: none;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.2s;
    background: var(--surface);
    color: var(--text2);
    border: 1px solid var(--border);
  }

  .btn:active { transform: scale(0.96); }

  .btn.primary {
    background: var(--accent);
    color: white;
    border-color: transparent;
    flex: 2;
    font-size: 17px;
    box-shadow: 0 4px 20px rgba(233,69,96,0.3);
  }

  .btn.primary.playing {
    background: #4caf50;
    box-shadow: 0 4px 20px rgba(76,175,80,0.3);
  }

  /* Time sig */
  .section-label {
    font-size: 12px;
    color: var(--text2);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .chip-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }

  .chip {
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 14px;
    font-weight: 500;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text2);
    cursor: pointer;
    transition: all 0.15s;
  }

  .chip.active {
    background: var(--card);
    border-color: var(--accent);
    color: var(--text);
  }

  /* Tap tempo */
  .tap-btn {
    width: 100%;
    padding: 20px;
    border-radius: 14px;
    background: var(--surface);
    border: 1.5px dashed rgba(245,166,35,0.4);
    color: var(--accent2);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.1s;
    margin-top: 8px;
  }

  .tap-btn:active {
    transform: scale(0.97);
    background: rgba(245,166,35,0.1);
  }

  /* Presets page */
  .presets-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }

  .add-btn {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 8px 16px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }

  .preset-list { display: flex; flex-direction: column; gap: 10px; }

  .preset-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    transition: border-color 0.15s;
  }

  .preset-card:active { border-color: var(--accent); }

  .preset-bpm {
    font-size: 26px;
    font-weight: 800;
    color: var(--accent);
    min-width: 56px;
    font-variant-numeric: tabular-nums;
  }

  .preset-info { flex: 1; }
  .preset-title { font-size: 15px; font-weight: 600; }
  .preset-meta { font-size: 12px; color: var(--text2); margin-top: 2px; }

  .preset-del {
    background: none;
    border: none;
    color: var(--text2);
    font-size: 20px;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 8px;
    line-height: 1;
  }

  .preset-del:active { color: var(--accent); }

  .empty-state {
    text-align: center;
    padding: 48px 24px;
    color: var(--text2);
  }

  .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
  .empty-state p { font-size: 15px; }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    align-items: flex-end;
    justify-content: center;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border-radius: 20px 20px 0 0;
    padding: 24px 24px calc(24px + env(safe-area-inset-bottom));
    width: 100%;
    max-width: 480px;
  }

  .modal h2 { font-size: 18px; font-weight: 700; margin-bottom: 20px; }

  .input-group { margin-bottom: 16px; }

  .input-group label {
    display: block;
    font-size: 12px;
    color: var(--text2);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .input-group input {
    width: 100%;
    padding: 14px 16px;
    border-radius: 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 16px;
    outline: none;
  }

  .input-group input:focus { border-color: var(--accent); }

  .modal-btns { display: flex; gap: 10px; margin-top: 20px; }

  .modal-btns .btn { padding: 14px; font-size: 15px; }


</style>
</head>
<body>



<header>
  <h1>🎵 Metronome</h1>
</header>

<div class="tab-bar">
  <button class="tab active" onclick="switchTab('play')">Play</button>
  <button class="tab" onclick="switchTab('presets')">Presets</button>
</div>

<div class="page active" id="page-play">

  <div class="bpm-display">
    <div class="bpm-label">Beats per minute</div>
    <div class="bpm-number" id="bpm-display">120</div>
    <div class="bpm-name" id="bpm-name"></div>
  </div>

  <div class="beat-row" id="beat-row"></div>

  <div class="slider-wrap">
    <input type="range" id="bpm-slider" min="30" max="300" value="120" step="1"
      oninput="onSliderChange(this.value)" />
  </div>

  <div class="btn-row">
    <button class="btn" onclick="adjustBpm(-5)">−5</button>
    <button class="btn" onclick="adjustBpm(-1)">−1</button>
    <button class="btn primary" id="play-btn" onclick="togglePlay()">▶ Start</button>
    <button class="btn" onclick="adjustBpm(1)">+1</button>
    <button class="btn" onclick="adjustBpm(5)">+5</button>
  </div>

  <p class="section-label">Time signature</p>
  <div class="chip-row" id="timesig-chips"></div>

  <p class="section-label">Sound</p>
  <div class="chip-row" id="sound-chips"></div>

  <button class="tap-btn" id="tap-btn" onclick="tapTempo()">Tap Tempo</button>

  <div style="margin-top: 16px; display: flex; gap: 10px;">
    <button class="btn" onclick="openSaveModal()" style="flex:1; font-size:14px;">💾 Save preset</button>
  </div>

</div>

<div class="page" id="page-presets">
  <div class="presets-header">
    <p class="section-label" style="margin:0;">Saved songs</p>
    <button class="add-btn" onclick="openAddModal()">+ Add</button>
  </div>
  <div class="preset-list" id="preset-list"></div>
</div>

<!-- Save modal -->
<div class="modal-overlay" id="save-modal">
  <div class="modal">
    <h2>Save preset</h2>
    <div class="input-group">
      <label>Song / preset name</label>
      <input type="text" id="preset-title-input" placeholder="e.g. Wonderwall – Oasis" maxlength="60" />
    </div>
    <div class="input-group">
      <label>BPM</label>
      <input type="number" id="preset-bpm-input" min="30" max="300" />
    </div>
    <div class="modal-btns">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn primary" onclick="savePreset()">Save</button>
    </div>
  </div>
</div>

<!-- Add modal (same but opened from presets tab) -->
<div class="modal-overlay" id="add-modal">
  <div class="modal">
    <h2>Add preset</h2>
    <div class="input-group">
      <label>Song / preset name</label>
      <input type="text" id="add-title-input" placeholder="e.g. Don't Stop Me Now – Queen" maxlength="60" />
    </div>
    <div class="input-group">
      <label>BPM</label>
      <input type="number" id="add-bpm-input" min="30" max="300" value="120" />
    </div>
    <div class="modal-btns">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn primary" onclick="addPreset()">Add</button>
    </div>
  </div>
</div>

<script>
let bpm = 120;
let playing = false;
let timeSig = 4;
let freeTime = false;
let beatIndex = 0;
let audioCtx = null;
let nextNoteTime = 0;
let schedulerTimer = null;
let tapTimes = [];
let currentPresetName = '';
let soundType = 'click'; // click | beep | wood
let wakeLock = null;

const timeSigs = [1,2,3,4,5,6,7,8];
const sounds = ['click','beep','wood'];

function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playClick(time, isAccent) {
  const ctx = audioCtx;
  const gain = ctx.createGain();
  gain.connect(ctx.destination);

  if (soundType === 'click') {
    const buf = ctx.createBuffer(1, ctx.sampleRate * 0.04, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) {
      data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ctx.sampleRate * 0.006));
    }
    const src = ctx.createBufferSource();
    src.buffer = buf;
    const filter = ctx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.value = isAccent ? 1800 : 1000;
    filter.Q.value = 2;
    src.connect(filter);
    filter.connect(gain);
    gain.gain.setValueAtTime(isAccent ? 1.0 : 0.65, time);
    src.start(time);

  } else if (soundType === 'beep') {
    const osc = ctx.createOscillator();
    osc.type = 'sine';
    osc.frequency.value = isAccent ? 1200 : 800;
    osc.connect(gain);
    gain.gain.setValueAtTime(0, time);
    gain.gain.linearRampToValueAtTime(isAccent ? 0.5 : 0.3, time + 0.002);
    gain.gain.exponentialRampToValueAtTime(0.001, time + 0.06);
    osc.start(time);
    osc.stop(time + 0.07);

  } else if (soundType === 'wood') {
    const buf = ctx.createBuffer(1, ctx.sampleRate * 0.05, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) {
      data[i] = Math.sin(i * 0.35) * Math.exp(-i / (ctx.sampleRate * 0.012));
    }
    const src = ctx.createBufferSource();
    src.buffer = buf;
    src.connect(gain);
    gain.gain.setValueAtTime(isAccent ? 0.9 : 0.55, time);
    src.start(time);
  }
}

function scheduler() {
  while (nextNoteTime < audioCtx.currentTime + 0.1) {
    const isAccent = !freeTime && beatIndex === 0;
    playClick(nextNoteTime, isAccent);
    const snapBeat = freeTime ? 0 : (beatIndex === 0 ? (freeTime ? 0 : timeSig - 1) : beatIndex - 1);
    scheduleBeatFlash(isAccent, nextNoteTime - audioCtx.currentTime, snapBeat);
    nextNoteTime += 60.0 / bpm;
    beatIndex = freeTime ? 0 : (beatIndex + 1) % timeSig;
  }
  schedulerTimer = setTimeout(scheduler, 25);
}

function scheduleBeatFlash(isAccent, delay, snapBeat) {
  setTimeout(() => {
    highlightBeat(snapBeat, isAccent);
  }, Math.max(0, delay * 1000 - 15));
}

let lastHighlighted = -1;
function highlightBeat(idx, isAccent) {
  const dots = document.querySelectorAll('.beat-dot');
  dots.forEach((d, i) => {
    d.classList.remove('active');
    if (i === 0) d.classList.add('accent');
  });
  if (dots[idx]) dots[idx].classList.add('active');


}

function buildBeatDots() {
  const row = document.getElementById('beat-row');
  row.innerHTML = '';
  const count = freeTime ? 1 : timeSig;
  for (let i = 0; i < count; i++) {
    const d = document.createElement('div');
    d.className = 'beat-dot' + (!freeTime && i === 0 && timeSig > 1 ? ' accent' : '');
    row.appendChild(d);
  }
}

async function togglePlay() {
  if (playing) {
    clearTimeout(schedulerTimer);
    playing = false;
    beatIndex = 0;
    document.querySelectorAll('.beat-dot').forEach(d => d.classList.remove('active'));
    document.getElementById('play-btn').textContent = '▶ Start';
    document.getElementById('play-btn').classList.remove('playing');
    if (wakeLock) { wakeLock.release(); wakeLock = null; }
  } else {
    initAudio();
    playing = true;
    beatIndex = 0;
    nextNoteTime = audioCtx.currentTime + 0.05;
    scheduler();
    document.getElementById('play-btn').textContent = '⏹ Stop';
    document.getElementById('play-btn').classList.add('playing');
    try {
      if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen');
    } catch (e) {}
  }
}

document.addEventListener('visibilitychange', async () => {
  if (wakeLock && document.visibilityState === 'visible' && playing) {
    try { wakeLock = await navigator.wakeLock.request('screen'); } catch (e) {}
  }
});

function setBpm(val) {
  bpm = Math.min(300, Math.max(30, Math.round(val)));
  document.getElementById('bpm-display').textContent = bpm;
  const slider = document.getElementById('bpm-slider');
  slider.value = bpm;
  const pct = ((bpm - 30) / (300 - 30) * 100).toFixed(1);
  slider.style.setProperty('--val', pct + '%');
}

function adjustBpm(delta) { setBpm(bpm + delta); updateBpmName(); }

function onSliderChange(val) { setBpm(parseInt(val)); updateBpmName(); }

function updateBpmName() {
  const names = [
    [20,39,'Larghissimo'], [40,59,'Largo'], [60,65,'Larghetto'],
    [66,75,'Adagio'], [76,107,'Andante'], [108,119,'Moderato'],
    [120,155,'Allegro'], [156,175,'Vivace'], [176,199,'Presto'], [200,300,'Prestissimo']
  ];
  const name = names.find(([lo, hi]) => bpm >= lo && bpm <= hi);
  document.getElementById('bpm-name').textContent = name ? name[2] : '';
}

function buildChips() {
  const tc = document.getElementById('timesig-chips');
  timeSigs.forEach(n => {
    const c = document.createElement('div');
    c.className = 'chip' + (!freeTime && n === timeSig ? ' active' : '');
    c.textContent = n + '/4';
    c.onclick = () => {
      freeTime = false;
      timeSig = n;
      document.querySelectorAll('#timesig-chips .chip').forEach(x => x.classList.remove('active'));
      c.classList.add('active');
      buildBeatDots();
    };
    tc.appendChild(c);
  });
  const freeChip = document.createElement('div');
  freeChip.className = 'chip' + (freeTime ? ' active' : '');
  freeChip.textContent = 'Free';
  freeChip.onclick = () => {
    freeTime = true;
    document.querySelectorAll('#timesig-chips .chip').forEach(x => x.classList.remove('active'));
    freeChip.classList.add('active');
    buildBeatDots();
  };
  tc.appendChild(freeChip);

  const sc = document.getElementById('sound-chips');
  sounds.forEach(s => {
    const c = document.createElement('div');
    c.className = 'chip' + (s === soundType ? ' active' : '');
    c.textContent = s.charAt(0).toUpperCase() + s.slice(1);
    c.onclick = () => {
      soundType = s;
      document.querySelectorAll('#sound-chips .chip').forEach(x => x.classList.remove('active'));
      c.classList.add('active');
    };
    sc.appendChild(c);
  });
}

function tapTempo() {
  const now = Date.now();
  tapTimes = tapTimes.filter(t => now - t < 3000);
  tapTimes.push(now);
  if (tapTimes.length >= 2) {
    const intervals = [];
    for (let i = 1; i < tapTimes.length; i++) intervals.push(tapTimes[i] - tapTimes[i-1]);
    const avg = intervals.reduce((a,b) => a+b, 0) / intervals.length;
    setBpm(Math.round(60000 / avg));
    updateBpmName();
  }
  const btn = document.getElementById('tap-btn');
  const count = tapTimes.length;
  btn.textContent = count < 2 ? 'Tap again…' : `Tap Tempo  (${count} taps)`;
  setTimeout(() => {
    if (Date.now() - tapTimes[tapTimes.length-1] > 2000) btn.textContent = 'Tap Tempo';
  }, 2200);
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', (i===0) === (tab==='play'));
  });
  document.getElementById('page-play').classList.toggle('active', tab==='play');
  document.getElementById('page-presets').classList.toggle('active', tab==='presets');
  if (tab === 'presets') renderPresets();
}

function getPresets() {
  try { return JSON.parse(localStorage.getItem('metro_presets') || '[]'); } catch { return []; }
}

function savePresets(arr) {
  localStorage.setItem('metro_presets', JSON.stringify(arr));
}

function renderPresets() {
  const list = document.getElementById('preset-list');
  const presets = getPresets();
  if (presets.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="icon">🎵</div><p>No presets yet.<br>Save a BPM from the Play tab.</p></div>`;
    return;
  }
  list.innerHTML = '';
  presets.forEach((p, idx) => {
    const card = document.createElement('div');
    card.className = 'preset-card';
    const timeSigLabel = p.timeSig ? ` · ${p.timeSig}/4` : '';
    card.innerHTML = `
      <div class="preset-bpm">${p.bpm}</div>
      <div class="preset-info">
        <div class="preset-title">${escHtml(p.title)}</div>
        <div class="preset-meta">BPM ${p.bpm}${timeSigLabel}</div>
      </div>
      <button class="preset-del" onclick="deletePreset(${idx}, event)">×</button>
    `;
    card.onclick = (e) => {
      if (e.target.classList.contains('preset-del')) return;
      loadPreset(p);
    };
    list.appendChild(card);
  });
}

function loadPreset(p) {
  setBpm(p.bpm);
  if (p.timeSig) {
    timeSig = p.timeSig;
    document.querySelectorAll('#timesig-chips .chip').forEach((c, i) => {
      c.classList.toggle('active', timeSigs[i] === timeSig);
    });
    buildBeatDots();
  }
  currentPresetName = p.title;
  document.getElementById('bpm-name').textContent = p.title;
  updateBpmName();
  switchTab('play');
}

function deletePreset(idx, e) {
  e.stopPropagation();
  const presets = getPresets();
  presets.splice(idx, 1);
  savePresets(presets);
  renderPresets();
}

function openSaveModal() {
  document.getElementById('preset-title-input').value = '';
  document.getElementById('preset-bpm-input').value = bpm;
  document.getElementById('save-modal').classList.add('open');
  setTimeout(() => document.getElementById('preset-title-input').focus(), 100);
}

function openAddModal() {
  document.getElementById('add-title-input').value = '';
  document.getElementById('add-bpm-input').value = 120;
  document.getElementById('add-modal').classList.add('open');
  setTimeout(() => document.getElementById('add-title-input').focus(), 100);
}

function closeModal() {
  document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('open'));
}

function savePreset() {
  const title = document.getElementById('preset-title-input').value.trim();
  const bpmVal = parseInt(document.getElementById('preset-bpm-input').value);
  if (!title) { alert('Please enter a song name.'); return; }
  if (!bpmVal || bpmVal < 30 || bpmVal > 300) { alert('BPM must be between 30 and 300.'); return; }
  const presets = getPresets();
  presets.unshift({ title, bpm: bpmVal, timeSig });
  savePresets(presets);
  closeModal();
  setBpm(bpmVal);
  document.getElementById('bpm-name').textContent = title;
}

function addPreset() {
  const title = document.getElementById('add-title-input').value.trim();
  const bpmVal = parseInt(document.getElementById('add-bpm-input').value);
  if (!title) { alert('Please enter a song name.'); return; }
  if (!bpmVal || bpmVal < 30 || bpmVal > 300) { alert('BPM must be between 30 and 300.'); return; }
  const presets = getPresets();
  presets.unshift({ title, bpm: bpmVal, timeSig: 4 });
  savePresets(presets);
  closeModal();
  renderPresets();
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) closeModal(); });
});

buildChips();
buildBeatDots();
setBpm(120);
updateBpmName();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
</html>
