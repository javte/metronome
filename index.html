<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Jeds Metronome">
    <meta name="theme-color" content="#1a1a2e">
    <title>🕰️ Jeds Metronome</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        input, textarea { touch-action: auto; }

        :root {
            --bg: #1a1a2e;
            --surface: #16213e;
            --card: #0f3460;
            --accent: #e94560;
            --accent2: #f5a623;
            --text: #eaeaea;
            --text2: #a0a0b0;
            --border: rgba(255,255,255,0.1);
            --radius: 16px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg); color: var(--text);
            min-height: 100vh;
            display: flex; flex-direction: column; overflow-x: hidden;
        }

        header { padding: 40px 24px 16px; display: flex; align-items: center; justify-content: space-between; }
        header h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }

        .tab-bar { display: flex; background: var(--surface); border-radius: 12px; padding: 4px; margin: 0 24px 20px; }
        .tab { flex: 1; padding: 12px; text-align: center; border-radius: 9px; font-size: 14px; font-weight: 600; color: var(--text2); cursor: pointer; transition: all 0.2s; border: none; background: none; }
        .tab.active { background: var(--card); color: var(--text); box-shadow: 0 2px 8px rgba(0,0,0,0.2); }

        .page { display: none; flex: 1; padding: 0 24px 40px; }
        .page.active { display: block; animation: fadeIn 0.3s ease-out; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Song header */
        .song-header { margin-bottom: 14px; }
        .song-header-inner { background: var(--surface); border: 1px solid rgba(245,166,35,0.3); border-radius: 12px; padding: 10px 14px; display: flex; align-items: center; gap: 10px; }
        .song-header-name { font-size: 14px; font-weight: 600; color: var(--text); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .song-collection-badge { font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 6px; flex-shrink: 0; }
        .song-collection-badge.party { background: rgba(233,69,96,0.15); color: var(--accent); border: 1px solid rgba(233,69,96,0.3); }
        .song-collection-badge.personal { background: rgba(245,166,35,0.15); color: var(--accent2); border: 1px solid rgba(245,166,35,0.3); }

        /* BPM display */
        .bpm-display { background: var(--surface); border-radius: var(--radius); padding: 32px 24px 24px; text-align: center; margin-bottom: 20px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .bpm-label { font-size: 13px; color: var(--text2); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 4px; }
        .bpm-number { font-size: 80px; font-weight: 800; letter-spacing: -4px; line-height: 1; color: var(--text); font-variant-numeric: tabular-nums; }
        .bpm-name { font-size: 13px; color: var(--accent2); margin-top: 8px; min-height: 18px; font-style: italic; }

        /* Beat dots */
        .beat-row { display: flex; gap: 8px; justify-content: center; margin: 16px 0; min-height: 20px; }
        .beat-dot { width: 14px; height: 14px; border-radius: 50%; background: var(--border); transition: background 0.08s, transform 0.1s; }
        .beat-dot.accent { background: rgba(245,166,35,0.3); }
        .beat-dot.active { background: var(--accent) !important; transform: scale(1.3); }
        .beat-dot.accent.active { background: var(--accent2) !important; }

        /* Slider */
        .slider-wrap { margin: 24px 0; }
        input[type=range] { -webkit-appearance: none; appearance: none; width: 100%; height: 8px; border-radius: 4px; background: var(--surface); outline: none; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 28px; height: 28px; border-radius: 50%; background: var(--accent); cursor: pointer; box-shadow: 0 2px 10px rgba(233,69,96,0.5); border: 2px solid white; }

        /* Buttons */
        .btn-row { display: flex; gap: 10px; margin: 20px 0; }
        .btn { flex: 1; padding: 14px; border-radius: 14px; font-size: 15px; font-weight: 600; border: 1px solid var(--border); cursor: pointer; transition: transform 0.1s, background 0.2s; background: var(--surface); color: var(--text); }
        .btn:active { transform: scale(0.95); background: var(--card); }
        .btn.primary { background: var(--accent); color: white; border-color: transparent; flex: 2; font-size: 17px; box-shadow: 0 4px 20px rgba(233,69,96,0.3); }
        .btn.primary.playing { background: #4caf50; box-shadow: 0 4px 20px rgba(76,175,80,0.3); }

        .section-label { font-size: 12px; color: var(--text2); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 12px; margin-top: 20px; }
        .chip-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
        .chip { padding: 8px 16px; border-radius: 20px; font-size: 14px; font-weight: 500; background: var(--surface); border: 1px solid var(--border); color: var(--text2); cursor: pointer; transition: all 0.15s; }
        .chip.active { background: var(--card); border-color: var(--accent); color: var(--text); }

        .tap-btn { width: 100%; padding: 22px; border-radius: 14px; background: var(--surface); border: 2px dashed rgba(245,166,35,0.4); color: var(--accent2); font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.1s; margin-top: 12px; }
        .tap-btn:active { transform: scale(0.98); background: rgba(245,166,35,0.1); border-style: solid; }

        /* Presets page */
        .collection-tabs { display: flex; background: var(--surface); border-radius: 12px; padding: 4px; margin-bottom: 24px; border: 1px solid var(--border); }
        .col-tab { flex: 1; padding: 10px; text-align: center; border-radius: 8px; font-size: 13px; font-weight: 600; color: var(--text2); cursor: pointer; transition: all 0.2s; border: none; background: none; }
        .col-tab.active { background: var(--card); color: var(--text); }
        .col-tab.party.active { color: var(--accent); }
        .col-tab.personal.active { color: var(--accent2); }

        .presets-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .add-btn { background: var(--accent); color: white; border: none; border-radius: 10px; padding: 8px 16px; font-size: 14px; font-weight: 600; cursor: pointer; }

        .preset-list { display: flex; flex-direction: column; gap: 12px; }
        .preset-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 18px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: transform 0.1s; position: relative; overflow: hidden; }
        .preset-card:active { transform: scale(0.98); border-color: var(--accent); }
        .party-card { border-left: 4px solid var(--accent); }
        .personal-card { border-left: 4px solid var(--accent2); }
        .preset-bpm { font-size: 24px; font-weight: 800; color: var(--accent); min-width: 50px; font-variant-numeric: tabular-nums; }
        .preset-info { flex: 1; }
        .preset-title { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
        .preset-meta { font-size: 12px; color: var(--text2); }
        .preset-del { background: none; border: none; color: var(--text2); font-size: 22px; cursor: pointer; padding: 10px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .preset-handle { color: var(--text2); font-size: 18px; padding: 4px; cursor: grab; opacity: 0.5; }

        /* Modal */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; align-items: flex-end; justify-content: center; }
        .modal-overlay.open { display: flex; }
        .modal { background: var(--surface); border-radius: 24px 24px 0 0; padding: 24px 24px 40px; width: 100%; max-width: 480px; box-shadow: 0 -10px 40px rgba(0,0,0,0.5); }
        .modal h2 { font-size: 20px; font-weight: 700; margin-bottom: 24px; text-align: center; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 12px; color: var(--text2); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; font-weight: 600; }
        .input-group input { width: 100%; padding: 16px; border-radius: 12px; background: var(--bg); border: 1px solid var(--border); color: var(--text); font-size: 16px; outline: none; transition: border-color 0.2s; }
        .input-group input:focus { border-color: var(--accent); }
        .modal-btns { display: flex; gap: 12px; }
        .modal-btns .btn { padding: 16px; }
    </style>
</head>
<body>

<header>
    <h1>🕰️ Jeds Metronome</h1>
</header>

<div class="tab-bar">
    <button class="tab active" id="tab-play" onclick="switchTab('play')">Play</button>
    <button class="tab" id="tab-presets" onclick="switchTab('presets')">Presets</button>
    <button class="tab" id="tab-new" onclick="newFromScratch()">Reset</button>
</div>

<div class="page active" id="page-play">
    <div class="song-header" id="song-header" style="display:none;">
        <div class="song-header-inner">
            <div class="song-header-name" id="song-header-name"></div>
            <span class="song-collection-badge" id="song-collection-badge"></span>
        </div>
    </div>

    <div class="bpm-display">
        <div class="bpm-label">Beats per minute</div>
        <div class="bpm-number" id="bpm-display">120</div>
        <div class="bpm-name" id="bpm-name">Moderato</div>
    </div>

    <div class="beat-row" id="beat-row"></div>

    <div class="slider-wrap">
        <input type="range" id="bpm-slider" min="30" max="300" value="120" step="1" oninput="onSliderChange(this.value)" />
    </div>

    <div class="btn-row">
        <button class="btn" onclick="adjustBpm(-5)">−5</button>
        <button class="btn" onclick="adjustBpm(-1)">−1</button>
        <button class="btn primary" id="play-btn" onclick="togglePlay()">▶ Start</button>
        <button class="btn" onclick="adjustBpm(1)">+1</button>
        <button class="btn" onclick="adjustBpm(5)">+5</button>
    </div>

    <p class="section-label">Time signature</p>
    <div class="chip-row" id="timesig-chips"></div>

    <p class="section-label">Sound</p>
    <div class="chip-row" id="sound-chips"></div>

    <button class="tap-btn" id="tap-btn" onclick="tapTempo()">Tap Tempo</button>

    <div style="margin-top: 24px;">
        <button class="btn" id="bottom-save-btn" onclick="bottomSaveAction()" style="width:100%; font-size:14px; background: rgba(255,255,255,0.05)">💾 Save to Personal</button>
    </div>
</div>

<div class="page" id="page-presets">
    <div class="collection-tabs">
        <button class="col-tab active party" id="col-tab-party" onclick="switchCollection('party')">🎉 Jeds Party</button>
        <button class="col-tab personal" id="col-tab-personal" onclick="switchCollection('personal')">👤 Personal</button>
    </div>
    
    <div id="party-header" class="presets-header">
        <p class="section-label" style="margin:0;">Jeds Songs</p>
    </div>
    
    <div id="personal-header" class="presets-header" style="display:none;">
        <p class="section-label" style="margin:0;">Personal Presets</p>
        <button class="add-btn" onclick="openAddModal()">+ Add</button>
    </div>

    <div class="preset-list" id="preset-list"></div>
</div>

<!-- Save modal -->
<div class="modal-overlay" id="save-modal">
    <div class="modal">
        <h2>Save to Personal</h2>
        <div class="input-group">
            <label>Song Name</label>
            <input type="text" id="preset-title-input" placeholder="e.g. Wonderwall – Oasis" maxlength="60" />
        </div>
        <div class="input-group">
            <label>BPM</label>
            <input type="number" id="preset-bpm-input" min="30" max="300" />
        </div>
        <div class="modal-btns">
            <button class="btn" onclick="closeModal()">Cancel</button>
            <button class="btn primary" onclick="savePreset()">Save Preset</button>
        </div>
    </div>
</div>

<!-- Add modal -->
<div class="modal-overlay" id="add-modal">
    <div class="modal">
        <h2>Add to Personal</h2>
        <div class="input-group">
            <label>Song Name</label>
            <input type="text" id="add-title-input" placeholder="e.g. Don't Stop Me Now – Queen" maxlength="60" />
        </div>
        <div class="input-group">
            <label>BPM</label>
            <input type="number" id="add-bpm-input" min="30" max="300" value="120" />
        </div>
        <div class="modal-btns">
            <button class="btn" onclick="closeModal()">Cancel</button>
            <button class="btn primary" onclick="addPreset()">Add to List</button>
        </div>
    </div>
</div>

<script>
/**
 * DATA & INITIALIZATION
 */
const JEDS_PARTY_PRESETS = [
    { title: "Almost There", bpm: 148, timeSig: 1, sound: "wood" },
    { title: "Every Time She Sees the Moon", bpm: 126, timeSig: 1, sound: "wood" },
    { title: "Sanctimony", bpm: 170, timeSig: 1, sound: "wood" },
    { title: "Byron Blues", bpm: 136, timeSig: 1, sound: "wood" },
    { title: "I'll Let You Down", bpm: 152, timeSig: 1, sound: "wood" },
    { title: "What is the Matter", bpm: 126, timeSig: 1, sound: "wood" },
    { title: "Round & Round", bpm: 166, timeSig: 1, sound: "wood" },
    { title: "Holy Water", bpm: 126, timeSig: 1, sound: "wood" }
];

let bpm = 120;
let playing = false;
let timeSig = 4;
let freeTime = false;
let beatIndex = 0;
let audioCtx = null;
let nextNoteTime = 0;
let schedulerTimer = null;
let tapTimes = [];
let currentPresetName = '';
let currentPresetIdx = -1;
let currentCollection = 'none';
let soundType = 'click';
let activePresetsCollection = 'party';

const timeSigs = [1,2,3,4,5,6,7,8];
const sounds = ['click','beep','wood'];

/**
 * AUDIO ENGINE
 */
function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playClick(time, isAccent) {
    const ctx = audioCtx;
    const gain = ctx.createGain();
    gain.connect(ctx.destination);
    
    if (soundType === 'click') {
        const buf = ctx.createBuffer(1, ctx.sampleRate * 0.04, ctx.sampleRate);
        const data = buf.getChannelData(0);
        for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ctx.sampleRate * 0.006));
        const src = ctx.createBufferSource(); src.buffer = buf;
        const filter = ctx.createBiquadFilter(); filter.type = 'bandpass'; filter.frequency.value = isAccent ? 1800 : 1000; filter.Q.value = 2;
        src.connect(filter); filter.connect(gain);
        gain.gain.setValueAtTime(isAccent ? 1.0 : 0.65, time); 
        src.start(time);
    } else if (soundType === 'beep') {
        const osc = ctx.createOscillator(); osc.type = 'sine'; osc.frequency.value = isAccent ? 1200 : 800; osc.connect(gain);
        gain.gain.setValueAtTime(0, time); 
        gain.gain.linearRampToValueAtTime(isAccent ? 0.5 : 0.3, time + 0.002); 
        gain.gain.exponentialRampToValueAtTime(0.001, time + 0.06);
        osc.start(time); osc.stop(time + 0.07);
    } else if (soundType === 'wood') {
        const buf = ctx.createBuffer(1, ctx.sampleRate * 0.05, ctx.sampleRate);
        const data = buf.getChannelData(0);
        for (let i = 0; i < data.length; i++) data[i] = Math.sin(i * 0.35) * Math.exp(-i / (ctx.sampleRate * 0.012));
        const src = ctx.createBufferSource(); src.buffer = buf; src.connect(gain);
        gain.gain.setValueAtTime(isAccent ? 0.9 : 0.55, time); src.start(time);
    }
}

function scheduler() {
    while (nextNoteTime < audioCtx.currentTime + 0.1) {
        const isAccent = !freeTime && beatIndex === 0;
        playClick(nextNoteTime, isAccent);
        const snap = freeTime ? 0 : (beatIndex === 0 ? timeSig - 1 : beatIndex - 1);
        scheduleBeatFlash(isAccent, nextNoteTime - audioCtx.currentTime, beatIndex);
        nextNoteTime += 60.0 / bpm;
        beatIndex = freeTime ? 0 : (beatIndex + 1) % timeSig;
    }
    schedulerTimer = setTimeout(scheduler, 25);
}

function scheduleBeatFlash(isAccent, delay, index) {
    setTimeout(() => highlightBeat(index), Math.max(0, delay * 1000 - 15));
}

function highlightBeat(idx) {
    const dots = document.querySelectorAll('.beat-dot');
    dots.forEach((d, i) => {
        d.classList.remove('active');
    });
    if (dots[idx]) dots[idx].classList.add('active');
}

/**
 * UI BUILDERS
 */
function buildBeatDots() {
    const row = document.getElementById('beat-row');
    row.innerHTML = '';
    const count = freeTime ? 1 : timeSig;
    for (let i = 0; i < count; i++) {
        const d = document.createElement('div');
        d.className = 'beat-dot' + (!freeTime && i === 0 && timeSig > 1 ? ' accent' : '');
        row.appendChild(d);
    }
}

function buildChips() {
    const tc = document.getElementById('timesig-chips');
    tc.innerHTML = '';
    timeSigs.forEach(n => {
        const c = document.createElement('div');
        c.className = 'chip' + (!freeTime && n === timeSig ? ' active' : '');
        c.textContent = n + '/4';
        c.onclick = () => { 
            freeTime = false; timeSig = n; 
            document.querySelectorAll('#timesig-chips .chip').forEach(x => x.classList.remove('active')); 
            c.classList.add('active'); buildBeatDots(); markPresetDirty(); 
        };
        tc.appendChild(c);
    });
    const freeChip = document.createElement('div');
    freeChip.className = 'chip' + (freeTime ? ' active' : '');
    freeChip.textContent = 'Free';
    freeChip.onclick = () => { 
        freeTime = true; 
        document.querySelectorAll('#timesig-chips .chip').forEach(x => x.classList.remove('active')); 
        freeChip.classList.add('active'); buildBeatDots(); markPresetDirty(); 
    };
    tc.appendChild(freeChip);

    const sc = document.getElementById('sound-chips');
    sc.innerHTML = '';
    sounds.forEach(s => {
        const c = document.createElement('div');
        c.className = 'chip' + (s === soundType ? ' active' : '');
        c.textContent = s.charAt(0).toUpperCase() + s.slice(1);
        c.onclick = () => { 
            soundType = s; 
            document.querySelectorAll('#sound-chips .chip').forEach(x => x.classList.remove('active')); 
            c.classList.add('active'); markPresetDirty(); 
        };
        sc.appendChild(c);
    });
}

/**
 * CORE LOGIC
 */
async function togglePlay() {
    if (playing) {
        clearTimeout(schedulerTimer); playing = false; beatIndex = 0;
        document.querySelectorAll('.beat-dot').forEach(d => d.classList.remove('active'));
        document.getElementById('play-btn').textContent = '▶ Start';
        document.getElementById('play-btn').classList.remove('playing');
    } else {
        initAudio(); playing = true; beatIndex = 0;
        nextNoteTime = audioCtx.currentTime + 0.05;
        scheduler();
        document.getElementById('play-btn').textContent = '⏹ Stop';
        document.getElementById('play-btn').classList.add('playing');
    }
}

function setBpm(val) {
    bpm = Math.min(300, Math.max(30, Math.round(val)));
    document.getElementById('bpm-display').textContent = bpm;
    const slider = document.getElementById('bpm-slider');
    slider.value = bpm;
    updateBpmName();
}

function adjustBpm(delta) { setBpm(bpm + delta); markPresetDirty(); }
function onSliderChange(val) { setBpm(parseInt(val)); markPresetDirty(); }

function updateBpmName() {
    const names = [
        [20, 39, 'Larghissimo'], [40, 59, 'Largo'], [60, 65, 'Larghetto'],
        [66, 75, 'Adagio'], [76, 107, 'Andante'], [108, 119, 'Moderato'],
        [120, 155, 'Allegro'], [156, 175, 'Vivace'], [176, 199, 'Presto'], [200, 300, 'Prestissimo']
    ];
    const n = names.find(([lo, hi]) => bpm >= lo && bpm <= hi);
    document.getElementById('bpm-name').textContent = n ? n[2] : '';
}

function tapTempo() {
    const now = Date.now();
    tapTimes = tapTimes.filter(t => now - t < 3000); 
    tapTimes.push(now);
    if (tapTimes.length >= 2) {
        const intervals = []; 
        for (let i = 1; i < tapTimes.length; i++) intervals.push(tapTimes[i] - tapTimes[i - 1]);
        const avg = intervals.reduce((a, b) => a + b, 0) / intervals.length;
        setBpm(Math.round(60000 / avg));
    }
    const btn = document.getElementById('tap-btn');
    btn.textContent = tapTimes.length < 2 ? 'Keep tapping...' : 'Tapping... (' + tapTimes.length + ')';
    setTimeout(() => { if (Date.now() - tapTimes[tapTimes.length - 1] > 2000) btn.textContent = 'Tap Tempo'; }, 2200);
}

/**
 * TABS & PERSISTENCE
 */
function switchTab(tab) {
    document.getElementById('tab-play').classList.toggle('active', tab === 'play');
    document.getElementById('tab-presets').classList.toggle('active', tab === 'presets');
    document.getElementById('page-play').classList.toggle('active', tab === 'play');
    document.getElementById('page-presets').classList.toggle('active', tab === 'presets');
    if (tab === 'presets') renderPresets();
}

function switchCollection(col) {
    activePresetsCollection = col;
    document.getElementById('col-tab-party').classList.toggle('active', col === 'party');
    document.getElementById('col-tab-personal').classList.toggle('active', col === 'personal');
    document.getElementById('party-header').style.display = col === 'party' ? 'flex' : 'none';
    document.getElementById('personal-header').style.display = col === 'personal' ? 'flex' : 'none';
    renderPresets();
}

function getPersonalPresets() { 
    try { return JSON.parse(localStorage.getItem('metro_presets') || '[]'); } 
    catch { return []; } 
}
function savePersonalPresets(arr) { localStorage.setItem('metro_presets', JSON.stringify(arr)); }

function renderPresets() {
    const list = document.getElementById('preset-list');
    list.innerHTML = '';
    
    const collection = activePresetsCollection === 'party' ? JEDS_PARTY_PRESETS : getPersonalPresets();
    
    if (collection.length === 0) {
        list.innerHTML = `<div style="text-align:center; padding:40px; color:var(--text2);">
            <div style="font-size:40px; margin-bottom:10px;">Empty</div>
            <p>Save songs to see them here.</p>
        </div>`;
        return;
    }

    collection.forEach((p, idx) => {
        const card = document.createElement('div');
        card.className = 'preset-card ' + (activePresetsCollection === 'party' ? 'party-card' : 'personal-card');
        const ts = p.freeTime ? ' · Free' : (p.timeSig ? ` · ${p.timeSig}/4` : '');
        card.innerHTML = `
            <div class="preset-bpm">${p.bpm}</div>
            <div class="preset-info">
                <div class="preset-title">${escHtml(p.title)}</div>
                <div class="preset-meta">BPM ${p.bpm}${ts}</div>
            </div>
            ${activePresetsCollection === 'personal' ? `<button class="preset-del" onclick="deletePreset(${idx},event)">×</button>` : ''}
        `;
        card.onclick = (e) => { 
            if (e.target.classList.contains('preset-del')) return;
            loadPreset(p, activePresetsCollection, idx); 
        };
        list.appendChild(card);
    });
}

function loadPreset(p, collection, idx) {
    setBpm(p.bpm);
    timeSig = p.timeSig || 4;
    freeTime = p.freeTime || false;
    soundType = p.sound || 'click';
    buildChips();
    buildBeatDots();
    currentPresetName = p.title;
    currentPresetIdx = idx;
    currentCollection = collection;
    updateSongHeader();
    switchTab('play');
}

function updateSongHeader() {
    const header = document.getElementById('song-header');
    const nameEl = document.getElementById('song-header-name');
    const badge = document.getElementById('song-collection-badge');
    const btn = document.getElementById('bottom-save-btn');
    
    if (currentPresetIdx >= 0 && currentPresetName) {
        header.style.display = 'block';
        nameEl.textContent = currentPresetName;
        if (currentCollection === 'party') {
            badge.textContent = "Party"; badge.className = 'song-collection-badge party';
            btn.textContent = '💾 Save to Personal';
        } else {
            badge.textContent = 'Personal'; badge.className = 'song-collection-badge personal';
            btn.textContent = '💾 Update "' + currentPresetName + '"';
        }
    } else {
        header.style.display = 'none';
        btn.textContent = '💾 Save to Personal';
    }
}

function markPresetDirty() {
    if (currentPresetIdx >= 0 && currentCollection === 'personal') {
        const btn = document.getElementById('bottom-save-btn');
        btn.textContent = '💾 Update (modified)';
        btn.style.borderColor = 'var(--accent2)';
    }
}

function bottomSaveAction() {
    if (currentPresetIdx >= 0 && currentCollection === 'personal') {
        const presets = getPersonalPresets();
        presets[currentPresetIdx] = { title: currentPresetName, bpm, timeSig, freeTime, sound: soundType };
        savePersonalPresets(presets);
        const btn = document.getElementById('bottom-save-btn');
        btn.textContent = '✓ Saved!';
        setTimeout(updateSongHeader, 1500);
    } else {
        openSaveModal();
    }
}

function newFromScratch() {
    if (playing) togglePlay();
    currentPresetName = ''; currentPresetIdx = -1; currentCollection = 'none';
    updateSongHeader();
    setBpm(120); timeSig = 4; freeTime = false; soundType = 'click';
    buildChips(); buildBeatDots(); switchTab('play');
}

function deletePreset(idx, e) {
    e.stopPropagation();
    const presets = getPersonalPresets();
    presets.splice(idx, 1);
    savePersonalPresets(presets);
    renderPresets();
}

function openSaveModal() {
    document.getElementById('preset-title-input').value = currentPresetName || '';
    document.getElementById('preset-bpm-input').value = bpm;
    document.getElementById('save-modal').classList.add('open');
}

function openAddModal() {
    document.getElementById('add-title-input').value = '';
    document.getElementById('add-modal').classList.add('open');
}

function closeModal() { document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('open')); }

function savePreset() {
    const title = document.getElementById('preset-title-input').value.trim();
    if (!title) return;
    const presets = getPersonalPresets();
    presets.unshift({ title, bpm, timeSig, freeTime, sound: soundType });
    savePersonalPresets(presets);
    closeModal();
    loadPreset(presets[0], 'personal', 0);
}

function addPreset() {
    const title = document.getElementById('add-title-input').value.trim();
    const bpmVal = parseInt(document.getElementById('add-bpm-input').value);
    if (!title) return;
    const presets = getPersonalPresets();
    presets.unshift({ title, bpm: bpmVal, timeSig: 4, freeTime: false, sound: 'click' });
    savePersonalPresets(presets);
    closeModal();
    renderPresets();
}

function escHtml(str) { return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

/**
 * INIT
 */
buildChips();
buildBeatDots();
updateBpmName();
</script>
</body>
</html>
